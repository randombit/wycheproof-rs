name: ci

on:
  push:
    branches: [main, master, updates]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * 1"

permissions:
  contents: read

env:
  CARGO_NET_GIT_FETCH_WITH_CLI: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  provenance:
    name: vector provenance
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: scripts/verify-wycheproof-data-offline.sh
      - run: scripts/verify-wycheproof-data.sh

  upstream-drift:
    name: upstream drift
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: scripts/check-wycheproof-drift.sh

  rustfmt:
    name: rustfmt
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy --workspace --all-targets -- --deny warnings

  test:
    name: test (${{ matrix.toolchain }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable, beta, nightly, 1.85.0]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
      - run: cargo test --workspace
      - run: cargo test --workspace --all-targets
      - run: cargo doc --workspace --no-deps

  minimal-imports:
    name: minimal downstream imports
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: scripts/verify-minimal-imports.sh

  package-sizes:
    name: package sizes
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: scripts/verify-package-sizes.sh
      - run: scripts/publish-workspace.sh --dry-run
